<div class="main-container">
  <header class="header header-6">
    <div class="branding">
      <cds-icon shape="applications" size="24" style="margin-right: 8px; color: #3A9FE8;"></cds-icon>
      <span class="title">Enterprise Portal</span>
    </div>
    <div class="header-actions">
      <span class="federation-tag">Module Federation</span>
      <clr-dropdown>
        <button class="nav-icon" clrDropdownTrigger aria-label="user menu">
          <cds-icon shape="user" size="20"></cds-icon>
        </button>
        <clr-dropdown-menu clrPosition="bottom-right">
          <a clrDropdownItem>Profile</a>
          <a clrDropdownItem>Settings</a>
          <a clrDropdownItem>Logout</a>
        </clr-dropdown-menu>
      </clr-dropdown>
    </div>
  </header>
  <div class="content-container">
    <clr-vertical-nav [clrVerticalNavCollapsible]="true" class="nav-sidebar">
      <a clrVerticalNavLink routerLink="/orders" routerLinkActive="active">
        <cds-icon clrVerticalNavIcon shape="shopping-bag"></cds-icon>
        Orders
      </a>
      <a clrVerticalNavLink routerLink="/pcs" routerLinkActive="active">
        <cds-icon clrVerticalNavIcon shape="display"></cds-icon>
        PCs
      </a>
    </clr-vertical-nav>
    <div class="content-area">
      <div class="widget-strip">
        <app-widget />
        <app-remote-widget remoteName="orders-mfe" />
        <app-remote-widget remoteName="pcs-mfe" />
      </div>
      <div class="page-content">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
